name: kanade build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install signing certificate
        env:
          IOS_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$IOS_DISTRIBUTION_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 21600 -u build.keychain
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$IOS_DISTRIBUTION_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain

      - name: Install provisioning profiles
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          
          # Main App Profile
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > app_profile.mobileprovision
          APP_PLIST=$(security cms -D -i app_profile.mobileprovision)
          APP_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$APP_PLIST")
          APP_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$APP_PLIST")
          cp app_profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$APP_UUID.mobileprovision"
          printf 'APP_PROFILE_NAME=%s\n' "$APP_NAME" >> "$GITHUB_ENV"

      - name: Build archive
        env:
          DEVELOPMENT_TEAM: F76Q3J6F82
        run: |
          xcodebuild \
            -project kanade.xcodeproj \
            -scheme kanade \
            -configuration Release \
            -archivePath "$PWD/build/kanade.xcarchive" \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            APP_PROFILE_SPECIFIER="$APP_PROFILE_NAME" \
            clean archive

      - name: Export IPA
        env:
          EXPORT_METHOD: development
          TEAM_ID: F76Q3J6F82
          BUNDLE_ID: com.sidharthify.kanade
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$APP_PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/kanade.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist ExportOptions.plist
          IPA_PATH=$(ls "$PWD/build/export"/*.ipa | head -n 1)
          cp "$IPA_PATH" kanade.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanade-${{ github.run_number }}.ipa
          path: kanade.ipa
          retention-days: 30
